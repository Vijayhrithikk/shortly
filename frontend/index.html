<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!--
      FOUC prevention: apply dark class BEFORE any CSS loads.
      Without this, there's a white flash on dark mode page loads/navigation.
    -->
    <script>
      (function () {
        try {
          var theme = localStorage.getItem("theme")
          if (theme === "dark") {
            document.documentElement.classList.add("dark")
          }
        } catch (e) {}
      })()
    </script>

    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230C0C0C'/%3E%3Crect x='5' y='13' width='17' height='6' rx='3' fill='%23F7F5F0'/%3E%3Cpolygon points='20,10 29,16 20,22' fill='%23F7F5F0'/%3E%3C/svg%3E"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap"
      rel="stylesheet"
    />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Shortlyy — Shorten, track and share URLs with beautiful analytics." />
    <title>Shortlyy — Links that tell a story</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

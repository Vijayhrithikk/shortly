services:
  postgres:
    image: postgres:17
    container_name: shortly-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Vijay1234
      POSTGRES_DB: shortly
    ports:
      - "5444:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: shortly-redis
    restart: always
    ports:
      - "6379:6379"

  api:
    build:
      context: ./backend
    container_name: shortly-api
    restart: always
    command: ./api
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
    env_file:
      - ./backend/.env

  worker:
    build:
      context: ./backend
    container_name: shortly-worker
    restart: always
    command: ./worker
    depends_on:
      - postgres
      - redis
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./frontend
    container_name: shortly-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  postgres_data:
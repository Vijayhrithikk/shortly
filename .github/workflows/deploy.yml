name: Deploy Shortly

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build API image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/shortly-api:latest ./backend

      - name: Build Frontend image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/shortly-frontend:latest ./frontend

      - name: Push API image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/shortly-api:latest

      - name: Push Frontend image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/shortly-frontend:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd shortly

            sudo docker compose pull

            sudo docker compose down

            sudo docker compose up -d